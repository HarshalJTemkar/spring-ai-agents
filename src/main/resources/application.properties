spring.application.name=spring-ai-agents
server.port=8080

# OpenAI configuration - set OPENAI_API_KEY environment variable before running
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.4

# Logging
logging.level.org.springframework.ai=INFO
logging.level.com.example.agents=DEBUG
