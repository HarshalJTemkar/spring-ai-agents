spring.application.name=spring-ai-agents
server.port=8080

# OpenAI configuration - set OPENAI_API_KEY environment variable before running
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.4

# Retry behaviour for transient OpenAI errors (5xx, 429, network blips)
# Total attempts = 1 initial + (max-attempts - 1) retries
spring.ai.retry.max-attempts=3
spring.ai.retry.backoff.initial-interval=2s
spring.ai.retry.backoff.max-interval=30s
spring.ai.retry.backoff.multiplier=2
# Do NOT retry 4xx client errors (bad request, auth, etc.)
spring.ai.retry.on-client-errors=false

# Per-call HTTP timeout for the OpenAI chat client.
# Each agent step (researcher / writer / reviewer) is bounded by this.
# Whole pipeline upper bound ~= 3 x this value (sequential calls).
spring.ai.openai.chat.options.timeout=60s

# Logging
logging.level.org.springframework.ai=INFO
logging.level.com.example.agents=DEBUG
