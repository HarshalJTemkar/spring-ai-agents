spring.application.name=spring-ai-agents
server.port=8080

# OpenAI configuration - set OPENAI_API_KEY environment variable before running
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.4

# ---------------------------------------------------------------------------
# Per-agent retry & timeout (programmatic, see Agents.java + AgentProperties)
# ---------------------------------------------------------------------------
# Defaults applied when an agent has no explicit override.
agents.defaults.max-attempts=3
agents.defaults.timeout=60s
agents.defaults.backoff-initial=2s
agents.defaults.backoff-max=30s
agents.defaults.backoff-multiplier=2.0

# Researcher: web search can be slow + flaky -> more attempts, longer timeout
agents.researcher.max-attempts=4
agents.researcher.timeout=90s
agents.researcher.backoff-initial=2s
agents.researcher.backoff-max=30s
agents.researcher.backoff-multiplier=2.0

# Writer: pure LLM summarisation, fast and deterministic
agents.writer.max-attempts=2
agents.writer.timeout=45s
agents.writer.backoff-initial=1s
agents.writer.backoff-max=10s
agents.writer.backoff-multiplier=2.0

# Reviewer: short polishing pass, tightest budget
agents.reviewer.max-attempts=2
agents.reviewer.timeout=30s
agents.reviewer.backoff-initial=1s
agents.reviewer.backoff-max=10s
agents.reviewer.backoff-multiplier=2.0

# ---------------------------------------------------------------------------
# Spring AI's own retry on transient OpenAI errors (5xx, 429, network blips).
# This sits INSIDE each agent attempt, so total attempts ~= agent-attempts x ai-retry.
# Keep it small to avoid retry amplification.
# ---------------------------------------------------------------------------
spring.ai.retry.max-attempts=2
spring.ai.retry.backoff.initial-interval=1s
spring.ai.retry.backoff.max-interval=10s
spring.ai.retry.backoff.multiplier=2
spring.ai.retry.on-client-errors=false

# Logging
logging.level.org.springframework.ai=INFO
logging.level.com.example.agents=DEBUG